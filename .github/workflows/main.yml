name: Download Full Musical Show
on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'Facebook හෝ YouTube Live Link එක මෙතනට දෙන්න'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Download Video
        run: |
          # මෙතනදී වීඩියෝ එක musical_show_full.mp4 නමින්ම force කරනවා
          yt-dlp -f "bestvideo[height<=480]+bestaudio/best[height<=480]" \
          --no-check-certificate \
          --live-from-start \
          --wait-for-video 10 \
          --merge-output-format mp4 \
          -o "musical_show_full.mp4" \
          "${{ github.event.inputs.stream_url }}"

      - name: Check file existence
        run: ls -R

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Full-Musical-Video
          path: "*.mp4"  # ෆෝල්ඩර් එකේ තියෙන ඕනෑම .mp4 ෆයිල් එකක් අප්ලෝඩ් කරයි
          retention-days: 1
