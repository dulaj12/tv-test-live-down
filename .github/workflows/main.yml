name: Download Full Musical Show
on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'Facebook හෝ YouTube Live Link එක මෙතනට දෙන්න'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    # පැය 6ක් දක්වා රන් වීමට ඉඩ ලබා දෙයි
    timeout-minutes: 360 
    steps:
      - name: Free Disk Space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Download Video
        run: |
          # --continue සහ --retry මගින් බාධා වුවහොත් නැවත උත්සාහ කරයි
          yt-dlp -f "bestvideo[height<=480]+bestaudio/best[height<=480]" \
          --no-check-certificate \
          --live-from-start \
          --wait-for-video 30 \
          --continue \
          --retries infinite \
          --fragment-retries infinite \
          --merge-output-format mp4 \
          -o "musical_show_full.mp4" \
          "${{ github.event.inputs.stream_url }}"

      - name: Upload Artifact
        if: always() # Error එකක් ආවත් තිබුණු ටික අප්ලෝඩ් කරයි
        uses: actions/upload-artifact@v4
        with:
          name: Full-Musical-Video
          path: "*.mp4"
          retention-days: 1
